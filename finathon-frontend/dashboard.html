<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finathon Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Finathon</h2>
            <ul>
                <li><a href="#" id="addTransactionBtn">➕ Add Transaction</a></li>
                <li><a href="#" id="viewInsightsBtn">📊 View Insights</a></li>
                <li><a href="#" id="logoutBtn">🚪 Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h2>Welcome, <span id="username">User</span>!</h2>
            </header>

            <section class="financial-summary">
                <div class="card income">
                    <h3>Total Income</h3>
                    <p id="totalIncome">₹0.00</p>
                </div>
                <div class="card expense">
                    <h3>Total Expenses</h3>
                    <p id="totalExpenses">₹0.00</p>
                </div>
                <div class="card balance">
                    <h3>Current Balance</h3>
                    <p id="currentBalance">₹0.00</p>
                </div>
            </section>

            <section class="charts">
                <h3>Financial Insights</h3>
                <canvas id="expenseChart"></canvas>
            </section>

            <!-- Transaction Form (Hidden by Default) -->
            <div id="transactionForm" class="modal">
                <div class="modal-content">
                    <h3>Add Transaction</h3>
                    <form id="transactionFormElement">
                        <input type="number" id="amount" placeholder="Amount" required>
                        <select id="category">
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Other">Other</option>
                        </select>
                        <select id="type">
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                        <button type="submit">Add</button>
                        <button type="button" id="closeFormBtn">Close</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
